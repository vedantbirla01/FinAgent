services:
  mongo:
    image: mongo:7
    container_name: finagent-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: finagent-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/finagent
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=30d
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.3-70b-versatile
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: finagent-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  mongo_data: